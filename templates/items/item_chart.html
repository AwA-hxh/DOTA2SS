<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Item Charts</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .chart-box { max-width: 1100px; margin: 18px 0; }
    canvas { width: 100% !important; height: auto !important; }
    label { font-weight: 600; }
    .toggles label { font-weight: 500; margin-right: 14px; }
  </style>
</head>
<body>
  <div class="row">
    <h1 style="margin:0;">Item {{ item_id }} Charts</h1>

    <label for="range">Time range:</label>
    <select id="range">
      <option value="7d">7 days</option>
      <option value="30d" selected>30 days</option>
      <option value="all">All</option>
    </select>

    <div class="toggles">
      <label><input type="checkbox" id="showPriceTrend" checked> Show Price Trend</label>
      <label><input type="checkbox" id="showQtyTrend" checked> Show Quantity Trend</label>
    </div>
  </div>

  <div class="chart-box">
    <h2>Price Over Time</h2>
    <canvas id="priceChart"></canvas>
  </div>

  <div class="chart-box">
    <h2>Quantity Over Time</h2>
    <canvas id="qtyChart"></canvas>
  </div>

  <script>
    const itemId = {{ item_id }};
    const rangeSelect = document.getElementById("range");
    const showPriceTrend = document.getElementById("showPriceTrend");
    const showQtyTrend = document.getElementById("showQtyTrend");

    let priceChart = null;
    let qtyChart = null;

    // 强制让“点击图例”一定能切换显示/隐藏
    function legendToggleOnClick(e, legendItem, legend) {
      const chart = legend.chart;
      const idx = legendItem.datasetIndex;
      chart.setDatasetVisibility(idx, !chart.isDatasetVisible(idx));
      chart.update();

      // 同步 checkbox（如果点击的是 Trend 那条）
      if (chart === priceChart && idx === 1) showPriceTrend.checked = chart.isDatasetVisible(1);
      if (chart === qtyChart && idx === 1) showQtyTrend.checked = chart.isDatasetVisible(1);
    }

    async function fetchData(range) {
      const res = await fetch(`/api/items/${itemId}/history/?range=${range}`);
      return await res.json();
    }

    function applyCheckboxVisibility() {
      if (priceChart) {
        priceChart.setDatasetVisibility(1, showPriceTrend.checked);
        priceChart.update();
      }
      if (qtyChart) {
        qtyChart.setDatasetVisibility(1, showQtyTrend.checked);
        qtyChart.update();
      }
    }

    async function render(range) {
      const data = await fetchData(range);

      // 兼容：如果你一时没改后端，也能用旧字段
      const trendPrice = data.trend_price ?? data.trend ?? [];
      const trendQty = data.trend_qty ?? [];

      if (!priceChart) {
        priceChart = new Chart(document.getElementById("priceChart"), {
          type: "line",
          data: {
            labels: data.labels,
            datasets: [
              { label: "Price", data: data.prices, borderWidth: 2, pointRadius: 3 },
              { label: "Trend", data: trendPrice, borderDash: [6, 6], borderWidth: 3, pointRadius: 0 }
            ]
          },
          options: {
            responsive: true,
            plugins: { legend: { onClick: legendToggleOnClick } }
          }
        });

        qtyChart = new Chart(document.getElementById("qtyChart"), {
          type: "line",
          data: {
            labels: data.labels,
            datasets: [
              { label: "Quantity", data: data.quantities, borderWidth: 2, pointRadius: 3 },
              { label: "Trend", data: trendQty, borderDash: [6, 6], borderWidth: 3, pointRadius: 0 }
            ]
          },
          options: {
            responsive: true,
            plugins: { legend: { onClick: legendToggleOnClick } }
          }
        });

        applyCheckboxVisibility();
        return;
      }

      // 更新数据（不要重建 datasets，否则你点隐藏/显示的状态会被覆盖）
      priceChart.data.labels = data.labels;
      priceChart.data.datasets[0].data = data.prices;
      priceChart.data.datasets[1].data = trendPrice;
      priceChart.update();

      qtyChart.data.labels = data.labels;
      qtyChart.data.datasets[0].data = data.quantities;
      qtyChart.data.datasets[1].data = trendQty;
      qtyChart.update();

      applyCheckboxVisibility();
    }

    rangeSelect.addEventListener("change", () => render(rangeSelect.value));
    showPriceTrend.addEventListener("change", applyCheckboxVisibility);
    showQtyTrend.addEventListener("change", applyCheckboxVisibility);

    render(rangeSelect.value);
  </script>
</body>
</html>
