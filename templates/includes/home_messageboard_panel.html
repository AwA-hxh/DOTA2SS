<div class="messageboard-container">

<h2>Message Board</h2>

<div class="post-box">
<form method="POST" action="{% url 'messageboard:post_message' topic_key='general' %}">
    {% csrf_token %}
    
    <textarea 
        name="text" 
        maxlength="500"
        placeholder="Leave a message..."
        required
        style="width:100%;height:80px;"
    ></textarea>

    <div style="display:flex;justify-content:space-between;margin-top:5px;">
        <small id="char-counter">0 / 500</small>
        <button type="submit">Post</button>
    </div>

</form>
</div>


<div class="messages">

{% if roots %}
    {% for node in roots %}
        {% include "messageboard/partial_recursive.html" with node=node depth=0 %}
    {% endfor %}
{% else %}
    <p>No messages yet.</p>
{% endif %}

</div>

</div>
